name: Daily Capture

on:
  schedule:
    - cron: '0 22 * * *'   # 日本時間 7時
    - cron: '0 10 * * *'   # 日本時間  19時
  workflow_dispatch:       # 手動実行ボタンを有効化

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      HEADLESS: "true"
      R2_ACCESS_KEY:  ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY:  ${{ secrets.R2_SECRET_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT:    ${{ secrets.R2_ENDPOINT }}
      R2_PUBLIC_URL:  ${{ vars.R2_PUBLIC_URL }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      - name: Pythonセットアップ
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwrightブラウザのインストール
        run: playwright install chromium --with-deps

      - name: Tesseractのインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-jpn

      - name: キャプチャ実行
        run: python main.py
 
      - name: 結果をArtifactsに保存
        uses: actions/upload-artifact@v4.6.2
        with:
          name: capture-${{ github.run_id }}
          path: data/
          retention-days: 7
      
      - name: HTML生成 (available_dates.json)
        run: python generate_html.py

      - name: Pagesのセットアップ
        uses: actions/configure-pages@v5.0.0

      - name: Pagesアーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: docs/

      - name: GitHub Pagesにデプロイ
        id: deployment
        uses: actions/deploy-pages@v4.0.5